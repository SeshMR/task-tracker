<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Login screen -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#6366f1"/>
          <path d="M8 14l4 4 8-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>TaskFlow</span>
      </div>
      <h1 class="login-heading">Welcome back</h1>
      <p class="login-sub">Sign in with Google to manage your tasks</p>
      <div id="google-signin-btn"></div>
      <p class="login-footer-note">Your tasks are stored privately in your browser.</p>
    </div>
  </div>

  <div class="app" id="app" style="display:none;">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="#6366f1"/>
            <path d="M8 14l4 4 8-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>TaskFlow</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-filter="all">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
          All Tasks
          <span class="badge" id="badge-all">0</span>
        </button>
        <button class="nav-item" data-filter="today">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Today
          <span class="badge" id="badge-today">0</span>
        </button>
        <button class="nav-item" data-filter="upcoming">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          Upcoming
          <span class="badge" id="badge-upcoming">0</span>
        </button>
        <button class="nav-item" data-filter="completed">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Completed
          <span class="badge badge-green" id="badge-completed">0</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="stats">
          <div class="stat">
            <span class="stat-num" id="stat-total">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat">
            <span class="stat-num" id="stat-done">0</span>
            <span class="stat-label">Done</span>
          </div>
          <div class="stat">
            <span class="stat-num" id="stat-pending">0</span>
            <span class="stat-label">Pending</span>
          </div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span class="progress-label" id="progress-label">0% complete</span>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div class="search-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search tasks…" />
          </div>
        </div>
        <div class="topbar-right">
          <button class="btn-primary" id="add-task-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Task
          </button>
          <div class="user-info" id="user-info"></div>
        </div>
      </header>

      <div class="content">
        <div class="content-header">
          <h1 id="view-title">All Tasks</h1>
          <div class="sort-wrap">
            <label for="sort-select">Sort:</label>
            <select id="sort-select" class="sort-select">
              <option value="date-asc">Date (earliest)</option>
              <option value="date-desc">Date (latest)</option>
              <option value="title-asc">Title A–Z</option>
              <option value="title-desc">Title Z–A</option>
            </select>
          </div>
        </div>

        <div class="task-list" id="task-list">
          <!-- Tasks rendered here -->
        </div>

        <div class="empty-state" id="empty-state" style="display:none;">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#c7d2fe" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <p class="empty-title">No tasks here</p>
          <p class="empty-sub">Click <strong>Add Task</strong> to get started.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modal-backdrop" style="display:none;">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">Add Task</h2>
        <button class="modal-close" id="modal-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form class="modal-body" id="task-form" novalidate>
        <input type="hidden" id="task-id" />

        <div class="form-group">
          <label for="task-title">Title <span class="required">*</span></label>
          <input type="text" id="task-title" class="form-control" placeholder="What needs to be done?" autocomplete="off" />
          <span class="field-error" id="title-error"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="task-date">Date <span class="required">*</span></label>
            <input type="date" id="task-date" class="form-control" />
            <span class="field-error" id="date-error"></span>
          </div>
          <div class="form-group">
            <label for="task-time">Time</label>
            <input type="time" id="task-time" class="form-control" />
          </div>
        </div>

        <div class="form-group">
          <label for="task-location">Location</label>
          <div class="input-icon-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <input type="text" id="task-location" class="form-control has-icon" placeholder="Add a location (optional)" autocomplete="off" />
          </div>
        </div>

        <div class="form-group">
          <label for="task-notes">Notes</label>
          <textarea id="task-notes" class="form-control" rows="3" placeholder="Any extra details…"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-ghost" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn-primary" id="modal-submit">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete confirm dialog -->
  <div class="modal-backdrop" id="delete-backdrop" style="display:none;">
    <div class="modal modal-sm" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>Delete Task?</h2>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary);margin:0 0 1.5rem;">This action cannot be undone.</p>
        <div class="modal-footer">
          <button class="btn-ghost" id="delete-cancel">Cancel</button>
          <button class="btn-danger" id="delete-confirm">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
